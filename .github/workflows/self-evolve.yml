name: Self-Evolve

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — print issues that would be created without actually creating them'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  triage-open-items:
    name: Resolve stale issues and triage open PRs
    runs-on: ubuntu-latest
    outputs:
      open_issue_count: ${{ steps.triage.outputs.open_issue_count }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Triage open agentic issues and PRs
        id: triage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          set -euo pipefail
          echo "=== Triaging open agentic issues and PRs ==="

          # ------------------------------------------------------------------
          # Auto-close issues whose condition is now resolved (file now exists)
          # ------------------------------------------------------------------
          declare -A ISSUE_FILE_MAP
          ISSUE_FILE_MAP["Add CODEOWNERS file for automated review assignment"]=".github/CODEOWNERS"
          ISSUE_FILE_MAP["Add pull request template to standardise PR descriptions"]=".github/pull_request_template.md"
          ISSUE_FILE_MAP["Add .gitignore to prevent committing build artifacts and secrets"]=".gitignore"
          # Note: issue titles below must match the titles used in the inspect-and-improve job exactly
          ISSUE_FILE_MAP["Add a LICENSE file to the repository"]="LICENSE LICENSE.md LICENSE.txt"
          ISSUE_FILE_MAP["Add CONTRIBUTING.md to document how to contribute to the project"]="CONTRIBUTING.md .github/CONTRIBUTING.md"
          ISSUE_FILE_MAP["Add copilot-instructions.md to guide the Copilot coding agent"]=".github/copilot-instructions.md"

          for title in "${!ISSUE_FILE_MAP[@]}"; do
            files="${ISSUE_FILE_MAP[$title]}"
            file_found=false
            for file in $files; do
              [ -f "$file" ] && file_found=true && break
            done
            if [ "$file_found" = "true" ]; then
              issue_num=$(gh issue list \
                --repo "$REPO" \
                --label "agentic" \
                --state open \
                --json number,title \
                --jq ".[] | select(.title == \"$title\") | .number" \
                2>/dev/null | head -1 || true)
              if [ -n "$issue_num" ]; then
                if [ "$DRY_RUN" = "true" ]; then
                  echo "[DRY RUN] Would close issue #$issue_num: '$title' (condition now resolved)"
                else
                  gh issue close "$issue_num" \
                    --repo "$REPO" \
                    --comment "✅ Automatically closed: condition is now resolved in the repository." \
                    2>/dev/null && echo "Closed resolved issue #$issue_num: $title" || true
                fi
              fi
            fi
          done

          # ------------------------------------------------------------------
          # Report open agentic issues and PRs for situational awareness
          # ------------------------------------------------------------------
          echo ""
          echo "--- Open agentic issues ---"
          gh issue list \
            --repo "$REPO" \
            --label "agentic" \
            --state open \
            --json number,title,createdAt \
            --jq '.[] | "  #\(.number) \(.title) (opened \(.createdAt[:10]))"' \
            2>/dev/null || true

          echo ""
          echo "--- Open agentic / Copilot PRs ---"
          gh pr list \
            --repo "$REPO" \
            --state open \
            --json number,title,author,mergeable,labels \
            --jq '.[] | select(
                .author.login == "copilot-swe-agent[bot]" or
                .author.login == "github-copilot[bot]" or
                .author.login == "Copilot" or
                (.labels | map(.name) | contains(["agentic"]))
              ) | "  #\(.number) \(.title) by \(.author.login) (mergeable: \(.mergeable))"' \
            2>/dev/null || true

          # ------------------------------------------------------------------
          # Count remaining open issues so the next job has visibility
          # ------------------------------------------------------------------
          open_count=$(gh issue list \
            --repo "$REPO" \
            --label "agentic" \
            --state open \
            --json number \
            --jq 'length' \
            2>/dev/null || echo "0")
          echo ""
          echo "Open agentic issues after triage: $open_count"
          echo "open_issue_count=$open_count" >> "$GITHUB_OUTPUT"
          echo "=== Triage complete ==="

  inspect-and-improve:
    name: Inspect repository and create improvement issues
    runs-on: ubuntu-latest
    needs: triage-open-items
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure required labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh label create "agentic" \
            --repo "$REPO" \
            --description "Applied to all issues and PRs created by the agentic system" \
            --color "0075ca" \
            2>/dev/null || true

      - name: Analyse repository state
        id: analysis
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          OPEN_ISSUE_COUNT: ${{ needs.triage-open-items.outputs.open_issue_count }}
        run: |
          set -euo pipefail

          echo "=== Repository self-inspection ==="
          echo "Open agentic issues backlog: $OPEN_ISSUE_COUNT"

          # ------------------------------------------------------------------
          # Helper: create an issue if one with the same title does not exist.
          # ------------------------------------------------------------------
          create_issue() {
            local title="$1"
            local body="$2"
            local label="${3:-agentic}"

            if [ "$DRY_RUN" = "true" ]; then
              echo "[DRY RUN] Would create issue: $title"
              return
            fi

            # Deduplicate: skip if an open issue with this exact title exists
            existing=$(gh issue list \
              --repo "$REPO" \
              --label "$label" \
              --state open \
              --json title \
              --jq ".[] | select(.title == \"$title\") | .title" \
              2>/dev/null | head -1 || true)

            if [ -n "$existing" ]; then
              echo "Issue already exists (skipping): $title"
              return
            fi

            gh issue create \
              --repo "$REPO" \
              --title "$title" \
              --body "$body" \
              --label "$label" \
              --assignee "Copilot" \
              2>/dev/null && echo "Created issue: $title" || echo "Warning: could not create issue: $title"
          }

          # ------------------------------------------------------------------
          # Check 1 — README completeness
          # ------------------------------------------------------------------
          readme_lines=$(wc -l < README.md 2>/dev/null || echo 0)
          if [ "$readme_lines" -lt 20 ]; then
            create_issue \
              "Improve README.md with comprehensive project documentation" \
              "## Category
          documentation

          ## Description
          The \`README.md\` is very short ($readme_lines lines). It should describe:
          - What the project does and its goals
          - Architecture overview of the agentic workflow system
          - How to trigger the self-evolution workflow manually
          - How CI monitoring and auto-merge work
          - Contributing guidelines

          ## Acceptance Criteria
          - [ ] README has an introduction section explaining the project purpose
          - [ ] README describes each workflow (\`self-evolve\`, \`auto-merge\`, \`ci-monitor\`)
          - [ ] README explains how the Copilot agent is used
          - [ ] README is at least 50 lines long"
          fi

          # ------------------------------------------------------------------
          # Check 2 — Missing CODEOWNERS
          # ------------------------------------------------------------------
          if [ ! -f ".github/CODEOWNERS" ]; then
            create_issue \
              "Add CODEOWNERS file for automated review assignment" \
              "## Category
          workflow

          ## Description
          There is no \`.github/CODEOWNERS\` file. Adding one ensures that the
          Copilot coding agent is automatically requested as a reviewer on all
          pull requests, enabling fully autonomous review and merge cycles.

          ## Acceptance Criteria
          - [ ] \`.github/CODEOWNERS\` file created
          - [ ] \`* @Copilot\` (or the project owner) set as the default code owner
          - [ ] Verified that new PRs trigger a review request automatically"
          fi

          # ------------------------------------------------------------------
          # Check 3 — Missing PR template
          # ------------------------------------------------------------------
          if [ ! -f ".github/pull_request_template.md" ]; then
            create_issue \
              "Add pull request template to standardise PR descriptions" \
              "## Category
          workflow

          ## Description
          There is no pull request template. A standard template helps the
          Copilot agent produce consistent, reviewable PR descriptions.

          ## Acceptance Criteria
          - [ ] \`.github/pull_request_template.md\` created
          - [ ] Template includes sections: Summary, Changes, Testing, Checklist"
          fi

          # ------------------------------------------------------------------
          # Check 4 — TODO / FIXME comments in tracked files
          #           (excluding workflow files to avoid self-referential hits)
          # ------------------------------------------------------------------
          todo_count=0
          todo_count=$(git grep -rn --count -E "TODO|FIXME|HACK|XXX" \
            -- '*.py' '*.js' '*.ts' '*.go' '*.sh' \
            2>/dev/null | awk -F: '{sum+=$2} END{print sum+0}') || todo_count=0

          if [ "$todo_count" -gt 0 ]; then
            todo_files=$(git grep -rn -E "TODO|FIXME|HACK|XXX" \
              -- '*.py' '*.js' '*.ts' '*.go' '*.sh' \
              2>/dev/null | head -20 | sed 's/^/  /' || true)
            create_issue \
              "Resolve TODO/FIXME/HACK comments in source files" \
              "## Category
          code quality

          ## Description
          Found $todo_count TODO/FIXME/HACK/XXX annotations in tracked source files.
          Each should either be fixed immediately or converted to a tracked issue.

          \`\`\`
          $todo_files
          \`\`\`

          ## Acceptance Criteria
          - [ ] All TODO/FIXME/HACK/XXX comments resolved or converted to issues
          - [ ] No new TODO comments introduced"
          fi

          # ------------------------------------------------------------------
          # Check 5 — Workflow health: missing permissions block
          # ------------------------------------------------------------------
          for wf in .github/workflows/*.yml .github/workflows/*.yaml; do
            [ -f "$wf" ] || continue
            wf_name=$(basename "$wf")

            # Check for missing permissions block
            if ! grep -q "^permissions:" "$wf" 2>/dev/null; then
              create_issue \
                "Add explicit \`permissions:\` block to workflow \`$wf_name\`" \
                "## Category
          security

          ## Description
          The workflow \`$wf_name\` does not declare an explicit \`permissions:\` block.
          This means it runs with the default (broad) permissions. Following the
          principle of least privilege, all workflows should declare only the
          permissions they actually need.

          ## Acceptance Criteria
          - [ ] Explicit \`permissions:\` block added to \`$wf_name\`
          - [ ] Only the minimum necessary permissions are granted
          - [ ] Workflow still functions correctly after the change"
            fi
          done

          # ------------------------------------------------------------------
          # Check 6 — Dependency files without lock files
          # ------------------------------------------------------------------
          if [ -f "package.json" ] && [ ! -f "package-lock.json" ] && [ ! -f "yarn.lock" ] && [ ! -f "pnpm-lock.yaml" ]; then
            create_issue \
              "Add lock file for Node.js dependencies" \
              "## Category
          dependency

          ## Description
          A \`package.json\` exists but there is no lock file (\`package-lock.json\`,
          \`yarn.lock\`, or \`pnpm-lock.yaml\`). Lock files ensure reproducible builds.

          ## Acceptance Criteria
          - [ ] Lock file generated and committed
          - [ ] CI workflow uses the lock file for installs"
          fi

          if [ -f "requirements.txt" ] && [ ! -f "requirements-lock.txt" ] && [ ! -f "Pipfile.lock" ]; then
            create_issue \
              "Add pinned dependency lock file for Python project" \
              "## Category
          dependency

          ## Description
          A \`requirements.txt\` exists without a corresponding lock file.
          Pinning exact versions prevents unexpected breakage from upstream updates.

          ## Acceptance Criteria
          - [ ] Dependencies pinned to exact versions in \`requirements.txt\` or a lock file added
          - [ ] CI installs dependencies from the lock file"
          fi

          # ------------------------------------------------------------------
          # Check 7 — Missing .gitignore
          # ------------------------------------------------------------------
          if [ ! -f ".gitignore" ]; then
            create_issue \
              "Add .gitignore to prevent committing build artifacts and secrets" \
              "## Category
          code quality

          ## Description
          There is no \`.gitignore\` file. Without one, build artifacts, IDE
          configuration files, and accidental secrets may be committed.

          ## Acceptance Criteria
          - [ ] \`.gitignore\` created with sensible defaults for the languages used
          - [ ] No build artifacts or editor files are tracked by git"
          fi

          # ------------------------------------------------------------------
          # Check 8 — Workflow jobs missing timeout-minutes
          # ------------------------------------------------------------------
          for wf in .github/workflows/*.yml .github/workflows/*.yaml; do
            [ -f "$wf" ] || continue
            wf_name=$(basename "$wf")
            if ! grep -q "timeout-minutes:" "$wf" 2>/dev/null; then
              create_issue \
                "Add \`timeout-minutes\` to jobs in workflow \`$wf_name\`" \
                "## Category
          workflow

          ## Description
          The workflow \`$wf_name\` does not specify \`timeout-minutes\` on any of its jobs.
          Without a timeout, a hung job will consume runner minutes for up to 6 hours
          (the GitHub Actions default). Adding explicit timeouts prevents runaway jobs
          from wasting resources.

          ## Acceptance Criteria
          - [ ] Every job in \`$wf_name\` has a \`timeout-minutes:\` value appropriate to its workload
          - [ ] Workflow still completes successfully within the specified timeout"
            fi
          done

          # ------------------------------------------------------------------
          # Check 9 — Scheduled / PR workflows missing concurrency controls
          # ------------------------------------------------------------------
          for wf in .github/workflows/*.yml .github/workflows/*.yaml; do
            [ -f "$wf" ] || continue
            wf_name=$(basename "$wf")
            if grep -qE "^\s*(schedule|pull_request):" "$wf" 2>/dev/null; then
              if ! grep -qE "^concurrency:|^\s+concurrency:" "$wf" 2>/dev/null; then
                create_issue \
                  "Add \`concurrency:\` group to workflow \`$wf_name\` to prevent duplicate runs" \
                  "## Category
          workflow

          ## Description
          The workflow \`$wf_name\` is triggered by \`schedule\` or \`pull_request\` events
          but does not use a \`concurrency:\` group. Without one, overlapping runs
          (e.g., rapid pushes or backed-up scheduled runs) may execute simultaneously,
          causing race conditions and wasted runner minutes.

          ## Acceptance Criteria
          - [ ] Top-level \`concurrency:\` block added to \`$wf_name\` with \`cancel-in-progress: true\`
          - [ ] Workflow behaviour is unchanged for normal runs"
              fi
            fi
          done

          # ------------------------------------------------------------------
          # Check 10 — copilot-instructions.md completeness
          # ------------------------------------------------------------------
          if [ -f ".github/copilot-instructions.md" ]; then
            missing_sections=""
            for section in "Security" "Self-Evolution" "Pull Requests" "Issues"; do
              if ! grep -q "### $section" .github/copilot-instructions.md 2>/dev/null; then
                missing_sections="$missing_sections $section,"
              fi
            done
            if [ -n "$missing_sections" ]; then
              create_issue \
                "Enhance copilot-instructions.md with missing behaviour sections" \
                "## Category
          documentation

          ## Description
          The \`.github/copilot-instructions.md\` file is missing the following sections:
          ${missing_sections%,}

          These sections are important for the Copilot agent to behave correctly
          and autonomously across all repository operations.

          ## Acceptance Criteria
          - [ ] All missing sections added with clear, actionable instructions
          - [ ] Instructions are consistent with the repository's goals and workflows"
            fi
          else
            create_issue \
              "Add copilot-instructions.md to guide the Copilot coding agent" \
              "## Category
          documentation

          ## Description
          There is no \`.github/copilot-instructions.md\` file. This file defines
          the Copilot agent's behaviour rules, responsibilities, and conventions.
          Without it, the agent cannot operate autonomously and consistently.

          ## Acceptance Criteria
          - [ ] \`.github/copilot-instructions.md\` created with core behaviour rules
          - [ ] Instructions cover: Core Responsibilities, Issues, Pull Requests, Workflows, Self-Evolution, Security"
          fi

          # ------------------------------------------------------------------
          # Check 11 — Self-evolve workflow self-review
          # ------------------------------------------------------------------
          self_evolve_wf=".github/workflows/self-evolve.yml"
          if [ -f "$self_evolve_wf" ]; then
            # Count the number of distinct checks implemented (supports multi-digit check numbers)
            check_count=$(grep -cE "^          # Check [0-9]+" "$self_evolve_wf" 2>/dev/null || echo 0)
            if [ "$check_count" -lt 14 ]; then
              create_issue \
                "Expand self-evolve workflow with additional repository improvement checks" \
                "## Category
          workflow

          ## Description
          The \`self-evolve.yml\` workflow currently has only $check_count checks.
          To ensure the repository continuously improves, additional checks should be added.

          Consider adding checks for:
          - Workflow timeout and concurrency settings
          - Missing CI/CD workflows (lint, test, release)
          - \`copilot-instructions.md\` completeness
          - Missing contributing guide or code of conduct
          - Dependency security scanning
          - Action version pinning

          ## Acceptance Criteria
          - [ ] At least 10 meaningful checks are implemented in \`self-evolve.yml\`
          - [ ] New checks create actionable issues with clear acceptance criteria"
            fi

            # Check whether the triage phase (resolving issues before creating new ones) exists
            if ! grep -q "triage-open-items\|Triage open" "$self_evolve_wf" 2>/dev/null; then
              create_issue \
                "Add issue/PR triage phase to self-evolve workflow" \
                "## Category
          workflow

          ## Description
          The \`self-evolve.yml\` workflow does not have a triage phase that resolves
          stale or already-fixed issues before creating new ones. Without this, the
          issue backlog grows unboundedly and resolved items remain open.

          ## Acceptance Criteria
          - [ ] A triage job runs before the inspection job
          - [ ] Issues whose conditions are resolved are automatically closed
          - [ ] Open PRs with merge conflicts are flagged
          - [ ] The inspection job depends on the triage job completing"
            fi
          fi

          # ------------------------------------------------------------------
          # Check 12 — Missing CONTRIBUTING guide
          # ------------------------------------------------------------------
          if [ ! -f "CONTRIBUTING.md" ] && [ ! -f ".github/CONTRIBUTING.md" ]; then
            create_issue \
              "Add CONTRIBUTING.md to document how to contribute to the project" \
              "## Category
          documentation

          ## Description
          There is no \`CONTRIBUTING.md\` file. For an agentic repository, this guide
          is especially important: it describes how the autonomous improvement cycle
          works and how human contributors can interact with it.

          ## Acceptance Criteria
          - [ ] \`CONTRIBUTING.md\` or \`.github/CONTRIBUTING.md\` created
          - [ ] Document explains the agentic improvement cycle
          - [ ] Document explains how to trigger manual self-evolution
          - [ ] Document explains labelling and issue assignment conventions"
          fi

          # ------------------------------------------------------------------
          # Check 13 — Missing LICENSE file
          # ------------------------------------------------------------------
          if [ ! -f "LICENSE" ] && [ ! -f "LICENSE.md" ] && [ ! -f "LICENSE.txt" ]; then
            create_issue \
              "Add a LICENSE file to the repository" \
              "## Category
          other

          ## Description
          There is no \`LICENSE\` file in the repository. Without a license, the default
          copyright applies and others cannot legally use, copy, or contribute to the
          project.

          ## Acceptance Criteria
          - [ ] A \`LICENSE\` file is added (e.g., MIT, Apache 2.0)
          - [ ] The chosen license is appropriate for the project's goals"
          fi

          # ------------------------------------------------------------------
          # Check 14 — Workflow action versions pinned to branch names
          # ------------------------------------------------------------------
          for wf in .github/workflows/*.yml .github/workflows/*.yaml; do
            [ -f "$wf" ] || continue
            wf_name=$(basename "$wf")
            if grep -E "uses:.*@(main|master|HEAD)" "$wf" 2>/dev/null | grep -qvE '^[[:space:]]*#'; then
              create_issue \
                "Pin action versions in workflow \`$wf_name\` to avoid supply-chain risk" \
                "## Category
          security

          ## Description
          The workflow \`$wf_name\` references one or more GitHub Actions pinned to a
          branch name (\`@main\`, \`@master\`, or \`@HEAD\`) instead of an immutable tag
          or commit SHA. A compromised upstream action could silently run malicious code.

          ## Acceptance Criteria
          - [ ] All \`uses:\` references in \`$wf_name\` pinned to a specific version tag or commit SHA
          - [ ] Workflow still passes after pinning"
            fi
          done

          echo "=== Self-inspection complete ==="
